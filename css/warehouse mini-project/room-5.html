<!doctype html>

<html lang="en">
  <head>
    <!-- christopher romo, warehouse, 07/11/2026-->
    <title>warehouse</title>
    <meta charset="UTF-8" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Stack+Sans+Headline:wght@200..700&display=swap"
      rel="stylesheet"
    />

    <!-- styles -->
    <link href="styles.css" rel="stylesheet" />
  </head>

  <body>
    <style>
      .item {
        border-radius: 15px;
        height: 100px;
        width: 100px;
      }

      .large {
        grid-column: span 2;
        grid-row: span 2;
        height: 100%;
        width: 100%;
      }

      .long {
        grid-column: span 2;
        width: 100%;
      }

      .shelf {
        display: grid;
        grid-auto-flow: dense;
        grid-auto-rows: 100px;
        grid-template-columns: repeat(5, 1fr);
        justify-content: center;
        justify-items: center;
        margin: 50px auto;
        width: 50%;
      }

      .tall {
        grid-row: span 2;
        height: 100%;
      }
    </style>

    <h1>dense</h1>
    <div class="shelf">
      <img class="item" src="./box.jpg" alt="box" />
      <img class="item tall" src="./box.jpg" alt="box" />
      <img class="item" src="./box.jpg" alt="box" />
      <img class="item large" src="./box.jpg" alt="box" />
      <img class="item long" src="./box.jpg" alt="box" />
      <img class="item long" src="./box.jpg" alt="box" />
      <img class="item" src="./box.jpg" alt="box" />
      <img class="item tall" src="./box.jpg" alt="box" />
      <img class="item" src="./box.jpg" alt="box" />
      <img class="item tall" src="./box.jpg" alt="box" />
      <img class="item large" src="./box.jpg" alt="box" />
      <img class="item long" src="./box.jpg" alt="box" />
      <img class="item" src="./box.jpg" alt="box" />
      <img class="item" src="./box.jpg" alt="box" />
      <img class="item long" src="./box.jpg" alt="box" />
      <img class="item" src="./box.jpg" alt="box" />
      <img class="item tall" src="./box.jpg" alt="box" />
      <img class="item" src="./box.jpg" alt="box" />
      <img class="item tall" src="./box.jpg" alt="box" />
      <img class="item large" src="./box.jpg" alt="box" />
      <img class="item" src="./box.jpg" alt="box" />
      <a href="./room-6.html"
        ><img class="item" src="./door.jpg" alt="door"
      /></a>
    </div>

    <a href="https://www.magnific.com"
      >box: designed by juicy_fish - Magnific.com</a
    >

    >
  </body>
</html>
