<!doctype html>

<html lang="en">
  <head>
    <!-- christopher romo, pokemon league api-->
    <title>pokemon league api</title>
    <meta charset="UTF-8" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Stack+Sans+Headline:wght@200..700&display=swap"
      rel="stylesheet"
    />

    <!-- styles -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="./styles/styles.css" rel="stylesheet" />
    <link href="./styles/teams.css" rel="stylesheet" />

    <!-- javascript -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
    <script src="./js/teams.js" defer></script>
  </head>

  <body>
    <ul class="nav justify-content-center nav-underline">
      <li class="nav-item">
        <a class="nav-link" href="./index.html">pokemon</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="./trainers.html">trainers</a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" href="./teams.html">teams</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="./relationships.html">relationships</a>
      </li>
    </ul>

    <div class="main-container">
      <h1>
        teams endpoint
        <img
          alt="pokeball icon"
          class="icon"
          src="./images/pokeball-icon.png"
        />
      </h1>
      <div class="backdrop endpoints">
        <table>
          <tr>
            <td><a href="/teams">/teams</a></td>
            <td><p>all teams</p></td>
          </tr>
        </table>
      </div>
      <h1>
        add a team
        <img
          alt="pokeball icon"
          class="icon"
          src="./images/pokeball-icon.png"
        />
      </h1>
      <form class="backdrop form" id="add-team-form">
        <p>enter the following fields:</p>
        <div class="mb-3">
          <label class="form-label" for="add-team-trainer-id-input"
            >trainer id</label
          >
          <input
            class="form-control"
            id="add-team-trainer-id-input"
            min="1"
            placeholder="1"
            required
            type="number"
          />
        </div>
        <div class="mb-3">
          <label class="form-label" for="add-team-pokemon-id-input"
            >pokemon id</label
          >
          <input
            class="form-control"
            id="add-team-pokemon-id-input"
            min="1"
            placeholder="1"
            required
            type="number"
          />
        </div>
        <button class="btn form-button" type="submit">add</button>
      </form>
      <h1>
        remove a team
        <img
          alt="pokeball icon"
          class="icon"
          src="./images/pokeball-icon.png"
        />
      </h1>
      <form class="backdrop form" id="remove-team-form">
        <p>enter the following fields:</p>
        <div class="mb-3">
          <label class="form-label" for="remove-team-trainer-id-input"
            >trainer id</label
          >
          <input
            class="form-control"
            id="remove-team-trainer-id-input"
            min="1"
            placeholder="1"
            required
            type="number"
          />
        </div>
        <div class="mb-3">
          <label class="form-label" for="remove-team-pokemon-id-input"
            >pokemon id</label
          >
          <input
            class="form-control"
            id="remove-team-pokemon-id-input"
            min="1"
            placeholder="1"
            required
            type="number"
          />
        </div>
        <button class="btn form-button" type="submit">remove</button>
      </form>
    </div>
  </body>
</html>
